# ============================================================
#  DEV Environment Overrides
#  Usage: helm install odoo-dev ./masa-odoo18 -f values-dev.yaml
# ============================================================

global:
  environment: dev
  projectName: masa
replicaCount: 1
odoo:
  initDb: true
  withoutDemo: false # allow demo data in dev
  adminPasswd: "masa_dev_admin"
  dbName: "False" # use default "odoo" DB for dev
  addonsPath: >-
    /mnt/extra-addons, /mnt/oca-addons, /mnt/custom-addons/dev
  config:
    logLevel: debug
    workers: 0
    devMode: "reload,qweb,werkzeug,xml"
    proxyMode: false
resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1"
    memory: "1Gi"
postgresql:
  auth:
    password: "dev_password"
    database: odoo_dev
  persistence:
    size: 2Gi
persistence:
  size: 5Gi
ingress:
  enabled: true
  host: dev.odoo.masa.local
image:
  repository: mohhus60/odoo18   # ← your Docker Hub username
  tag: "4c0ca7f"                                # ← the SHA from your CI run
  pullPolicy: IfNotPresent

# ============================================================
#  PRODUCTION Environment Overrides
# ============================================================

global:
  environment: production
  projectName: masa

replicaCount: 3

odoo:
  initDb: true
  withoutDemo: true
  adminPasswd: ""              # MUST be set via --set or external secret
  dbName: "odoo_production"
  addonsPath: >-
    /mnt/extra-addons,
    /mnt/oca-addons,
    /mnt/custom-addons/production
  config:
    logLevel: warn
    workers: 4
    maxCronThreads: 2
    devMode: ""
    proxyMode: true

resources:
  requests:
    cpu: "1"
    memory: "2Gi"
  limits:
    cpu: "4"
    memory: "4Gi"

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 2

postgresql:
  auth:
    password: ""               # MUST be set via --set or external secret
    database: odoo_production
  persistence:
    size: 20Gi
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "2Gi"

persistence:
  size: 50Gi

ingress:
  enabled: true
  host: odoo.masa.tech
  tls: true
  tlsSecret: prod-odoo-tls

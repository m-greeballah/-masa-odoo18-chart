apiVersion: v1
kind: Secret
metadata:
  name: {{ include "masa-odoo18.fullname" . }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "masa-odoo18.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.postgresql.auth.username | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgresql.auth.password | quote }}
  POSTGRES_DB: {{ .Values.odoo.dbName | quote }}
  ODOO_ADMIN_PASSWD: {{ .Values.odoo.adminPasswd | quote }}

apiVersion: v1
kind: Service
metadata:
  name: {{ include "masa-odoo18.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "masa-odoo18.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "masa-odoo18.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
    - name: longpolling
      port: {{ .Values.service.longpollingPort }}
      targetPort: longpolling
      protocol: TCP
